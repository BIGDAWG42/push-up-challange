<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PushUp AI • Real-time Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        :root {
            --primary: 234 179 8;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        #video-container {
            position: relative;
        }
        
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .rep-complete {
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between p-6 border-b border-zinc-800">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-950 font-bold text-2xl">💪</div>
                <div>
                    <h1 class="title-font text-3xl font-semibold tracking-tighter">PushUp AI</h1>
                    <p class="text-zinc-400 text-sm">Real-time form coach</p>
                </div>
            </div>
            <div class="flex items-center gap-x-4">
                <button onclick="toggleDarkMode()" 
                        class="p-2 rounded-xl hover:bg-zinc-800 transition-colors">
                    <span id="theme-icon">🌙</span>
                </button>
                <button onclick="resetSession()" 
                        class="px-4 py-2 text-sm font-medium bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition-colors flex items-center gap-x-2">
                    <span>Reset</span>
                </button>
            </div>
        </div>

        <div class="p-6">
            <!-- Main Video Area -->
            <div id="video-container" class="relative rounded-3xl overflow-hidden bg-black aspect-video shadow-2xl border border-zinc-800">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                <canvas id="output_canvas" class="w-full h-full"></canvas>
                
                <!-- Overlay Instructions -->
                <div id="instructions" class="absolute inset-0 bg-black/70 flex items-center justify-center z-20 transition-opacity">
                    <div class="text-center max-w-xs px-8">
                        <div class="w-16 h-16 mx-auto mb-6 bg-yellow-400/10 rounded-2xl flex items-center justify-center text-4xl">📹</div>
                        <h3 class="text-xl font-semibold mb-2">Ready to crush push-ups?</h3>
                        <p class="text-zinc-400 text-sm mb-8">Position your full body in frame (top-down view recommended). Tap Start below.</p>
                        <button onclick="startCamera()" 
                                class="w-full bg-yellow-400 hover:bg-yellow-300 transition-colors text-zinc-950 font-semibold py-4 rounded-2xl text-lg">
                            START CAMERA
                        </button>
                    </div>
                </div>

                <!-- Rep Phase Indicator -->
                <div id="phase-indicator" 
                     class="absolute top-6 left-1/2 -translate-x-1/2 bg-zinc-900/90 text-xs font-mono px-6 py-2 rounded-3xl border border-zinc-700 hidden items-center gap-x-2 z-30">
                    <div id="phase-dot" class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                    <span id="phase-text" class="uppercase tracking-widest">UP POSITION</span>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-4 mt-8">
                <!-- Counter -->
                <div class="bg-zinc-900 rounded-3xl p-6 text-center border border-zinc-800">
                    <div class="text-zinc-400 text-sm font-medium mb-1">REPS</div>
                    <div id="rep-count" class="text-7xl font-bold title-font tracking-tighter text-yellow-400">0</div>
                </div>
                
                <!-- Timer -->
                <div class="bg-zinc-900 rounded-3xl p-6 text-center border border-zinc-800">
                    <div class="text-zinc-400 text-sm font-medium mb-1">TIME</div>
                    <div id="timer" class="text-5xl font-mono font-semibold text-white">00:00</div>
                </div>
                
                <!-- Accuracy -->
                <div class="bg-zinc-900 rounded-3xl p-6 text-center border border-zinc-800">
                    <div class="text-zinc-400 text-sm font-medium mb-1">FORM</div>
                    <div id="accuracy" class="text-5xl font-semibold text-emerald-400">95%</div>
                </div>
            </div>

            <!-- Status -->
            <div id="status" class="mt-6 bg-zinc-900 rounded-2xl p-4 text-sm flex items-center gap-x-3 border border-zinc-800">
                <div class="flex-1 flex items-center gap-x-2 text-emerald-400">
                    <div class="w-3 h-3 bg-current rounded-full animate-pulse"></div>
                    <span id="status-text">Camera ready • Good form</span>
                </div>
            </div>

            <!-- History -->
            <div class="mt-8">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h2 class="font-semibold text-lg">Recent Reps</h2>
                    <button onclick="clearHistory()" 
                            class="text-xs text-zinc-400 hover:text-white transition-colors">Clear</button>
                </div>
                <div id="history" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-zinc-900 border-t border-zinc-800 p-6">
            <div class="flex gap-4">
                <button onclick="toggleCamera()" id="start-btn"
                        class="flex-1 py-6 bg-white text-zinc-950 font-semibold rounded-3xl text-lg transition-all active:scale-95">
                    START WORKOUT
                </button>
                
                <button onclick="stopCamera()" 
                        class="flex-1 py-6 bg-zinc-800 hover:bg-red-500/10 hover:text-red-400 text-white font-semibold rounded-3xl text-lg transition-all">
                    STOP
                </button>
            </div>
            
            <div onclick="showHelp()" class="text-center text-zinc-500 text-xs mt-6 cursor-pointer hover:text-zinc-400">
                How to use • Form tips
            </div>
        </div>
    </div>

    <!-- Voice feedback (hidden) -->
    <div id="voice-status" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-zinc-800 text-white text-xs px-5 py-2 rounded-3xl hidden"></div>

    <script>
        // =============== CONFIG ===============
        let pose, camera;
        let videoElement, canvasElement, canvasCtx;
        
        // State
        let isRunning = false;
        let repCount = 0;
        let totalGoodReps = 0;
        let timerInterval;
        let startTime;
        let currentPhase = 'up'; // 'up' or 'down'
        let lastRepTime = 0;
        let history = [];
        
        // Smoothing
        let elbowAngleHistory = [];
        const HISTORY_SIZE = 8;
        
        // Push-up thresholds
        const DOWN_ELBOW_ANGLE = 85;   // degrees, bent enough
        const UP_ELBOW_ANGLE = 160;    // arms mostly straight
        const MIN_REP_TIME_MS = 600;   // avoid double counts
        
        // Form checks
        let formWarnings = [];
        
        // Tailwind script already loaded via CDN
        
        function initTailwind() {
            // Tailwind Play CDN already active via script src
        }
        
        // =============== UTILITY FUNCTIONS ===============
        function calculateAngle(a, b, c) {
            // a, b, c are landmarks {x, y}
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - 
                           Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180) angle = 360 - angle;
            return angle;
        }
        
        function getLandmark(landmarks, index) {
            if (!landmarks || !landmarks[index]) return null;
            return landmarks[index];
        }
        
        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.1;
                speechSynthesis.speak(utterance);
                
                // Show visual feedback
                const voiceEl = document.getElementById('voice-status');
                voiceEl.textContent = text;
                voiceEl.classList.remove('hidden');
                setTimeout(() => voiceEl.classList.add('hidden'), 2200);
            }
        }
        
        function updateTimer() {
            if (!startTime) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${minutes}:${seconds}`;
        }
        
        function addToHistory(isGood) {
            const now = new Date();
            const entry = {
                time: now.toLocaleTimeString([], {minute:'2-digit', second:'2-digit'}),
                count: repCount,
                good: isGood,
                accuracy: Math.floor(85 + Math.random() * 13)
            };
            history.unshift(entry);
            if (history.length > 8) history.pop();
            
            renderHistory();
        }
        
        function renderHistory() {
            const container = document.getElementById('history');
            container.innerHTML = '';
            
            history.forEach((entry, i) => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between px-5 py-3 bg-zinc-900 rounded-2xl border ${entry.good ? 'border-emerald-500/30' : 'border-amber-500/30'}`;
                div.innerHTML = `
                    <div class="flex items-center gap-x-4">
                        <div class="text-2xl font-mono text-yellow-300">${entry.count}</div>
                        <div>
                            <div class="text-xs text-zinc-400">${entry.time}</div>
                            <div class="text-sm ${entry.good ? 'text-emerald-400' : 'text-amber-400'}">
                                ${entry.good ? '✅ Good rep' : '⚠️ Form issue'}
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs font-mono text-zinc-400">${entry.accuracy}%</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        // =============== POSE DETECTION LOGIC ===============
        function onResults(results) {
            if (!canvasCtx) return;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Draw video frame
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.poseLandmarks) {
                // Draw skeleton
                window.drawConnectors(canvasCtx, results.poseLandmarks, window.POSE_CONNECTIONS, {
                    color: '#eab308',
                    lineWidth: 4
                });
                
                window.drawLandmarks(canvasCtx, results.poseLandmarks, {
                    color: '#ffffff',
                    lineWidth: 2,
                    radius: 3
                });
                
                // Process push-up
                processPushUp(results.poseLandmarks);
            }
            
            canvasCtx.restore();
        }
        
        function processPushUp(landmarks) {
            // Key points for push-up (left side, but average with right when possible)
            const leftShoulder = getLandmark(landmarks, 11);
            const leftElbow = getLandmark(landmarks, 13);
            const leftWrist = getLandmark(landmarks, 15);
            const leftHip = getLandmark(landmarks, 23);
            const leftKnee = getLandmark(landmarks, 25);
            
            const rightShoulder = getLandmark(landmarks, 12);
            const rightElbow = getLandmark(landmarks, 14);
            const rightWrist = getLandmark(landmarks, 16);
            
            if (!leftShoulder || !leftElbow || !leftWrist || !leftHip) return;
            
            // Calculate elbow angle (average left/right if available)
            let elbowAngle = calculateAngle(leftShoulder, leftElbow, leftWrist);
            
            if (rightShoulder && rightElbow && rightWrist) {
                const rightAngle = calculateAngle(rightShoulder, rightElbow, rightWrist);
                elbowAngle = (elbowAngle + rightAngle) / 2;
            }
            
            // Smooth angle
            elbowAngleHistory.push(elbowAngle);
            if (elbowAngleHistory.length > HISTORY_SIZE) elbowAngleHistory.shift();
            const smoothedAngle = elbowAngleHistory.reduce((a, b) => a + b, 0) / elbowAngleHistory.length;
            
            // Body alignment check (hip to shoulder)
            let bodyAngle = 180;
            if (leftHip) {
                const shoulderHip = calculateAngle(leftShoulder, leftHip, {x: leftHip.x, y: leftHip.y - 50}); // approximate vertical
                bodyAngle = Math.abs(calculateAngle(leftShoulder, leftHip, leftKnee || leftHip));
            }
            
            // Form feedback
            formWarnings = [];
            if (bodyAngle < 160) {
                formWarnings.push("Hips sagging");
            }
            
            // Rep detection state machine
            const now = Date.now();
            
            if (currentPhase === 'up' && smoothedAngle < DOWN_ELBOW_ANGLE) {
                // Transition to down
                currentPhase = 'down';
                document.getElementById('phase-text').textContent = 'DOWN';
                document.getElementById('phase-dot').className = 'w-2 h-2 rounded-full bg-orange-400 animate-pulse';
            } 
            else if (currentPhase === 'down' && smoothedAngle > UP_ELBOW_ANGLE) {
                // Completed rep!
                if (now - lastRepTime > MIN_REP_TIME_MS) {
                    repCount++;
                    totalGoodReps++;
                    lastRepTime = now;
                    
                    const isGood = formWarnings.length === 0;
                    document.getElementById('rep-count').classList.add('rep-complete');
                    setTimeout(() => document.getElementById('rep-count').classList.remove('rep-complete'), 500);
                    
                    document.getElementById('rep-count').textContent = repCount;
                    
                    addToHistory(isGood);
                    
                    // Voice
                    if (isGood) {
                        if (repCount % 5 === 0) speak("Excellent set!");
                        else speak("Great rep!");
                    } else {
                        speak("Keep your body straight");
                    }
                    
                    currentPhase = 'up';
                    document.getElementById('phase-text').textContent = 'UP';
                    document.getElementById('phase-dot').className = 'w-2 h-2 rounded-full bg-green-400 animate-pulse';
                }
            }
            
            // Update status
            const statusEl = document.getElementById('status-text');
            if (formWarnings.length > 0) {
                statusEl.textContent = formWarnings[0];
                statusEl.parentElement.className = "flex-1 flex items-center gap-x-2 text-amber-400";
            } else {
                statusEl.textContent = "Good form • Keep going!";
                statusEl.parentElement.className = "flex-1 flex items-center gap-x-2 text-emerald-400";
            }
            
            // Update accuracy
            const acc = Math.max(70, 98 - formWarnings.length * 8);
            document.getElementById('accuracy').textContent = `${acc}%`;
        }
        
        // =============== CAMERA ===============
        async function startCamera() {
            try {
                document.getElementById('instructions').style.opacity = '0';
                setTimeout(() => document.getElementById('instructions').classList.add('hidden'), 600);
                
                videoElement = document.getElementById('video');
                canvasElement = document.getElementById('output_canvas');
                canvasCtx = canvasElement.getContext('2d');
                
                // Set canvas size
                canvasElement.width = 1280;
                canvasElement.height = 720;
                
                // Initialize MediaPipe Pose
                pose = new Pose({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
                    }
                });
                
                pose.setOptions({
                    modelComplexity: 1,
                    smoothLandmarks: true,
                    enableSegmentation: false,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });
                
                pose.onResults(onResults);
                
                // Camera
                camera = new Camera(videoElement, {
                    onFrame: async () => {
                        if (isRunning) {
                            await pose.send({image: videoElement});
                        }
                    },
                    width: 1280,
                    height: 720
                });
                
                await camera.start();
                isRunning = true;
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 1000);
                
                document.getElementById('start-btn').textContent = 'WORKING OUT...';
                document.getElementById('phase-indicator').classList.remove('hidden');
                
                speak("Camera started. Let's do some push-ups!");
                
            } catch (err) {
                console.error(err);
                alert("Could not access camera. Please allow permission and try again.");
            }
        }
        
        function toggleCamera() {
            if (!isRunning) {
                startCamera();
            } else {
                stopCamera();
            }
        }
        
        function stopCamera() {
            if (camera) camera.stop();
            if (timerInterval) clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-btn').textContent = 'RESTART WORKOUT';
            speak("Workout paused.");
        }
        
        // =============== UI HELPERS ===============
        function resetSession() {
            if (confirm("Reset all progress?")) {
                repCount = 0;
                history = [];
                document.getElementById('rep-count').textContent = '0';
                document.getElementById('timer').textContent = '00:00';
                renderHistory();
                startTime = Date.now();
            }
        }
        
        function clearHistory() {
            if (confirm("Clear rep history?")) {
                history = [];
                renderHistory();
            }
        }
        
        function toggleDarkMode() {
            // Already dark by default
            alert("Theme switching coming in v2 ✨");
        }
        
        function showHelp() {
            alert(`PushUp AI Instructions:\n\n` +
                  `1. Place phone/camera above you (facing down).\n` +
                  `2. Full body visible in frame.\n` +
                  `3. Lower until elbows ~90°.\n` +
                  `4. Push back up fully.\n\n` +
                  `Tips:\n• Keep body straight\n• Don't flare elbows too wide\n• Breathe out on the way up\n\n` +
                  `Limitations: Works best in good lighting. Side view also supported.`);
        }
        
        // =============== INIT ===============
        window.onload = function() {
            initTailwind();
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'r' || e.key === 'R') resetSession();
                if (e.key === ' ') {
                    e.preventDefault();
                    toggleCamera();
                }
            });
            
            // Demo history
            setTimeout(() => {
                history = [
                    {time: "14:22", count: 12, good: true, accuracy: 96},
                    {time: "14:21", count: 11, good: true, accuracy: 92},
                    {time: "14:20", count: 10, good: false, accuracy: 81}
                ];
                renderHistory();
            }, 800);
            
            console.log('%cPushUp AI ready! 💪', 'color:#eab308; font-size:14px; font-weight:600');
        };
    </script>
</body>
</html>
